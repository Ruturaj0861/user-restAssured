name: API Automation

on:
  schedule:
    - cron: '30 9 * * *'
  workflow_dispatch:

jobs:
  run-api-tests:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Automation Repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Clone API Repository
        run: |
          git clone https://github.com/Ruturaj0861/user-api.git

      - name: Install API Dependencies
        run: |
          cd user-api
          npm install

      - name: Start API Server
        run: |
          cd user-api
          node server.js > server.log 2>&1 &
          echo "Server started"

      - name: Wait for API
        run: |
          echo "Checking API..."
          for i in {1..30}; do
            if curl -s http://localhost:3000/api/users > /dev/null; then
              echo "API is running"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 2
          done

          echo "API failed to start"
          cat user-api/server.log
          exit 1

      - name: Run API Tests
        run: mvn clean test

      - name: Generate Allure Report
        run: mvn allure:report

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin

      - name: Send Email Report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: 🚀 API Automation Test Execution - SUCCESS
          to: ruturajdarekar@gmail.com,ruturajdarekar24@gmail.com
          from: Ruturaj Automation CI
          html_body: |
            <div style="font-family:Arial;padding:20px;background:#f6f8fa">
            
            <h2 style="color:#2ea44f;">✅ API Automation Testing Completed</h2>
            
            <p><b>Repository:</b> user-restAssured</p>
            <p><b>Execution Time:</b> Daily Scheduled Run</p>
            
            <table style="border-collapse:collapse;width:400px">
              <tr style="background:#24292e;color:white">
                <th style="padding:8px;border:1px solid #ddd">Metric</th>
                <th style="padding:8px;border:1px solid #ddd">Result</th>
              </tr>
              <tr>
                <td style="padding:8px;border:1px solid #ddd">Tests Run</td>
                <td style="padding:8px;border:1px solid #ddd">10</td>
              </tr>
              <tr>
                <td style="padding:8px;border:1px solid #ddd">Failures</td>
                <td style="padding:8px;border:1px solid #ddd;color:#d73a49">0</td>
              </tr>
              <tr>
                <td style="padding:8px;border:1px solid #ddd">Errors</td>
                <td style="padding:8px;border:1px solid #ddd">0</td>
              </tr>
              <tr>
                <td style="padding:8px;border:1px solid #ddd">Skipped</td>
                <td style="padding:8px;border:1px solid #ddd">0</td>
              </tr>
            </table>
            
            <br>
            
            <a href="https://github.com/Ruturaj0861/user-restAssured/actions"
            style="background:#0366d6;color:white;padding:12px 20px;text-decoration:none;border-radius:6px;">
            View Full Execution
            </a>
            
            <br><br>
            
            <p>📊 Download Allure Report from GitHub Actions Artifacts.</p>
            
            <hr>
            
            <p style="color:gray;font-size:12px">
            Generated automatically by GitHub Actions CI/CD
            </p>
            
            </div>