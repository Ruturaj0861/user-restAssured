name: API Automation

on:
  schedule:
    - cron: '30 9 * * *'   # 3 PM IST
  workflow_dispatch:

jobs:
  run-api-tests:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Automation Repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Verify Maven
        run: mvn -version

      - name: Clone API Repository
        run: |
          git clone https://github.com/Ruturaj0861/user-api.git

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install API Dependencies
        run: |
          cd user-api
          npm ci

      - name: Start API Server
        run: |
          cd user-api
          nohup node server.js &

      - name: Wait for API to Start
        run: |
          echo "Checking API..."
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "API is running"
              break
            fi
            echo "Waiting for API..."
            sleep 5
          done

      - name: Run API Automation Tests
        run: mvn clean test

      - name: Generate Allure Report
        run: mvn allure:report

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/site/allure-maven-plugin
          publish_branch: gh-pages

      - name: Send Email Report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: 🚀 API Automation Test Execution - SUCCESS
          to: ruturajdarekar@gmail.com,ruturajdarekar24@gmail.com
          from: API Automation CI
          html_body: |
            <div style="font-family:Arial;padding:20px;background:#f6f8fa">

            <h2 style="color:#2ea44f;">✅ API Automation Testing Completed</h2>

            <p><b>Repository:</b> user-restAssured</p>
            <p><b>Execution:</b> Scheduled Daily Run (3 PM)</p>

            <table style="border-collapse:collapse;width:400px">
              <tr style="background:#24292e;color:white">
                <th style="padding:8px;border:1px solid #ddd">Metric</th>
                <th style="padding:8px;border:1px solid #ddd">Result</th>
              </tr>
              <tr>
                <td style="padding:8px;border:1px solid #ddd">Tests Run</td>
                <td style="padding:8px;border:1px solid #ddd">10</td>
              </tr>
              <tr>
                <td style="padding:8px;border:1px solid #ddd">Failures</td>
                <td style="padding:8px;border:1px solid #ddd;color:#d73a49">0</td>
              </tr>
              <tr>
                <td style="padding:8px;border:1px solid #ddd">Errors</td>
                <td style="padding:8px;border:1px solid #ddd">0</td>
              </tr>
              <tr>
                <td style="padding:8px;border:1px solid #ddd">Skipped</td>
                <td style="padding:8px;border:1px solid #ddd">0</td>
              </tr>
            </table>

            <br>

            <a href="https://ruturaj0861.github.io/user-restAssured/"
            style="background:#0366d6;color:white;padding:12px 20px;text-decoration:none;border-radius:6px;">
            📊 Open Live Test Report
            </a>

            <br><br>

            <p>Generated automatically by GitHub CI/CD</p>

            </div>